<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>간편앨범 · Simple Album</title>
  <!-- 교육용 단일 목적 UI: 로그인 → 업로드 → 조회 흐름이 아키텍처와 1:1로 대응되도록 구성 -->
  <style>
    :root{
      --bg:#f5f3ee; --panel:#ffffff; --ink:#1c2430; --muted:#6b7480;
      --line:#e3e0d8; --accent:#d8643c; --ok:#2f7d5b; --shadow:0 1px 2px rgba(28,36,48,.06);
      --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);
      font:15px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif}
    .wrap{max-width:760px;margin:0 auto;padding:32px 20px 64px}
    h1{font-size:22px;letter-spacing:-.3px;margin:0 0 2px} .sub{color:var(--muted);margin:0 0 24px;font-size:13px}
    .step{background:var(--panel);border:1px solid var(--line);border-radius:12px;
      padding:18px 18px;margin:0 0 14px;box-shadow:var(--shadow)}
    .step h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 0 12px;
      display:flex;align-items:center;gap:8px}
    .num{display:inline-grid;place-items:center;width:20px;height:20px;border-radius:50%;
      background:var(--ink);color:#fff;font-size:11px;font-weight:600}
    input,button{font:inherit} input{padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:#fff;width:100%}
    .row{display:flex;gap:8px;flex-wrap:wrap} .row>*{flex:1;min-width:120px}
    button{padding:9px 14px;border:0;border-radius:8px;background:var(--ink);color:#fff;cursor:pointer;flex:0 0 auto}
    button:disabled{opacity:.4;cursor:not-allowed} button.accent{background:var(--accent)}
    .pill{font:12px/1 var(--mono);padding:4px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
    #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:4px}
    #grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid var(--line);background:#eee}
    .empty{color:var(--muted);font-size:13px;padding:8px 0}
    #log{font:12px/1.6 var(--mono);background:#1c2430;color:#cfd6df;border-radius:10px;padding:12px 14px;
      margin-top:18px;white-space:pre-wrap;max-height:220px;overflow:auto}
    .log-ok{color:#8fd6b0} .log-err{color:#f0a08a}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>간편앨범 <span class="pill" id="who">로그아웃 상태</span></h1>
    <p class="sub">로그인 → JWT 발행 → presigned URL로 S3 직접 업로드 → 썸네일 자동 생성 → 조회</p>

    <!-- 1) 로그인: /login 으로 RS256 JWT 발급 -->
    <section class="step">
      <h2><span class="num">1</span> 로그인</h2>
      <div class="row">
        <input id="username" placeholder="사용자 (예: james)" value="james" />
        <input id="password" type="password" placeholder="비밀번호 (데모: demo)" value="demo" />
        <button id="loginBtn">로그인</button>
      </div>
    </section>

    <!-- 2) 업로드: presigned URL 받아 S3로 직접 PUT -->
    <section class="step">
      <h2><span class="num">2</span> 사진 업로드</h2>
      <div class="row">
        <input id="file" type="file" accept="image/jpeg,image/png,image/webp" />
        <button id="uploadBtn" class="accent" disabled>업로드</button>
      </div>
    </section>

    <!-- 3) 조회: /albums 로 본인 썸네일 목록 + presigned GET -->
    <section class="step">
      <h2><span class="num">3</span> 내 앨범 <button id="refreshBtn" style="margin-left:auto" disabled>새로고침</button></h2>
      <div id="grid"></div>
      <div class="empty" id="emptyMsg">로그인 후 업로드하면 여기에 썸네일이 나타납니다.</div>
    </section>

    <div id="log">[log] 준비됨. 먼저 로그인하세요.</div>
  </div>
  <script src="app.js"></script>
</body>
</html>
